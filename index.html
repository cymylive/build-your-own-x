  }
  .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }

  /* Header */
  header {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-bottom: 1px solid var(--border);
    padding: 40px 0 30px;
    text-align: center;
    margin-bottom: 30px;
  }
  header h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 8px; }

  header .subtitle a { color: var(--accent); text-decoration: none; }

  /* Search & Filter */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    margin-bottom: 30px;
    align-items: center;
  }
  .search-box {
    position: relative;
    flex: 1;
    max-width: 500px;
    min-width: 200px;
  }
  .search-box input {
    width: 100%;
    padding: 10px 16px 10px 40px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    font-size: 0.95rem;
    outline: none;
    transition: border .2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box .icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 1.1rem;
  }
  .lang-filter {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }
  .lang-filter button {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-dim);
    font-size: 0.82rem;
    cursor: pointer;
    transition: all .2s;
  }
  .lang-filter button:hover, .lang-filter button.active {
    border-color: var(--accent);
    color: var(--accent);
    background: #1a2332;
  }
  .lang-filter button.all-btn {
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .lang-filter button.all-btn.active { background: #1a2e1a; }

  /* Stats */
  .stats { text-align: center; color: var(--text-dim); font-size: 0.85rem; margin-bottom: 20px; }

  /* Category */
  .category { margin-bottom: 40px; }
  .category-title {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .category-title .count {
    font-size: 0.8rem;
    color: var(--text-dim);
    font-weight: 400;
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    transition: all .2s;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(88,166,255,.08);
  }
  .card-title {
    font-size: 0.95rem;
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 10px;
    flex: 1;
  }
  .card-title a {
    color: var(--text);
    text-decoration: none;
  }
  .card-title a:hover { color: var(--accent); }
  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 500;
    background: var(--tag-bg);
    color: var(--tag-text);
  }
  .tag-video { background: #2d1b2d; color: #f9a8d4; }
  .tag-pdf { background: #1b2d1b; color: #86efac; }
  .tag-book { background: #2d2d1b; color: #fde68a; }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .empty .big { font-size: 3rem; margin-bottom: 10px; }

  /* Footer */
  footer {
    text-align: center;
    padding: 30px 0;
    color: var(--text-dim);
    font-size: 0.85rem;
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }
  footer a { color: var(--accent); text-decoration: none; }

  /* Responsive */
  @media (max-width: 768px) {
    header h1 { font-size: 1.6rem; }
    .card-grid { grid-template-columns: 1fr; }
    .controls { flex-direction: column; }
    .search-box { max-width: 100%; }
  }
</style>

let allLanguages = new Set();

data.forEach(cat => {
  cat.items.forEach(item => {
    if (item.k === undefined) item.k = "";
    item.l.split("/").forEach(l => {
      const lang = l.trim();
      if (lang) allLanguages.add(lang);
    });
  });
});

const langList = [...allLanguages].sort();

// Render filter buttons
const filterEl = document.getElementById("langFilter");
let filterHtml = `<button class="all-btn active" onclick="setLang('')">全部</button>`;
langList.forEach(lang => {
  filterHtml += `<button onclick="setLang('${lang}')">${lang}</button>`;
});
filterEl.innerHTML = filterHtml;

let currentLang = "";
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll("#langFilter button").forEach(b => b.classList.remove("active"));
  if (lang === "") {
    document.querySelector("#langFilter .all-btn").classList.add("active");
  } else {
    document.querySelectorAll(`#langFilter button`).forEach(b => {
      if (b.textContent === lang) b.classList.add("active");
    });
  }
  filterCards();
}

function filterCards() {
  const query = document.getElementById("searchInput").value.toLowerCase().trim();

  let totalItems = 0;
  let visibleItems = 0;

  let html = "";
  data.forEach(cat => {
    const filtered = cat.items.filter(item => {
      const matchLang = !currentLang || item.l.split("/").some(l => l.trim() === currentLang);
      const matchSearch = !query || item.t.toLowerCase().includes(query) || item.l.toLowerCase().includes(query) || item.t.includes(query);
      return matchLang && matchSearch;
    });

    if (filtered.length === 0) return;

    totalItems += cat.items.length;
    visibleItems += filtered.length;

    html += `<div class="category">`;
    html += `<div class="category-title">${cat.c} <span class="count">(${filtered.length} 个教程)</span></div>`;
    html += `<div class="card-grid">`;

    filtered.forEach(item => {
      let tags = `<span class="tag">${item.l}</span>`;
      if (item.k === "video") tags += `<span class="tag tag-video">🎬 视频</span>`;
      if (item.k === "pdf") tags += `<span class="tag tag-pdf">📄 PDF</span>`;

      html += `<div class="card">`;
      html += `<div class="card-title"><a href="${item.u}" target="_blank" rel="noopener">${item.t}</a></div>`;
      html += `<div class="card-meta">${tags}</div>`;
      html += `</div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById("cardsContainer").innerHTML = html || `<div class="empty"><div class="big">🔍</div><p>没有找到匹配的教程，试试其他关键词或语言过滤</p></div>`;

  document.getElementById("stats").textContent = `共 ${totalItems} 个教程，当前显示 ${visibleItems} 个`;
}

filterCards();
</script>

</body>
</html>
